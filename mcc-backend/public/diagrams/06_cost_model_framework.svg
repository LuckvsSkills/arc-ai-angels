<svg width="100%" viewBox="0 0 680 900" xmlns="http://www.w3.org/2000/svg">
  <text style="font-size: 18px; font-weight: 500;" x="340" y="30" text-anchor="middle" fill="#f1f5f9">Cost Model Framework</text>
  <text x="340" y="50" text-anchor="middle" fill="#94a3b8" font-size="12">Costs: Per Agent | Per Workflow | Per Platform | Per Month</text>

  <!-- Cost Dimension 1 -->
  <text style="font-size: 13px; font-weight: 600;" x="340" y="100" text-anchor="middle" fill="#f1f5f9">Cost Dimension 1: Per Agent / Per Month</text>

  <rect x="40" y="120" width="600" height="130" rx="8" fill="rgba(30, 41, 59, 0.6)" stroke="rgba(100, 116, 139, 0.3)" stroke-width="0.5"/>

  <text x="60" y="145" fill="#f1f5f9" font-weight="600" font-size="12">Cost bands based on model allocation & usage intensity</text>

  <rect x="60" y="160" width="140" height="60" rx="6" fill="#10b981"/>
  <text x="130" y="180" text-anchor="middle" dominant-baseline="central" fill="white" font-weight="600" font-size="12">Light Tier</text>
  <text x="130" y="197" text-anchor="middle" dominant-baseline="central" fill="white" font-size="10">~$50-100/month</text>
  <text x="130" y="211" text-anchor="middle" dominant-baseline="central" fill="white" font-size="10">Clio, Unia</text>

  <rect x="240" y="160" width="140" height="60" rx="6" fill="#f59e0b"/>
  <text x="310" y="180" text-anchor="middle" dominant-baseline="central" fill="white" font-weight="600" font-size="12">Medium Tier</text>
  <text x="310" y="197" text-anchor="middle" dominant-baseline="central" fill="white" font-size="10">~$200-400/month</text>
  <text x="310" y="211" text-anchor="middle" dominant-baseline="central" fill="white" font-size="10">Nero, Forge</text>

  <rect x="420" y="160" width="140" height="60" rx="6" fill="#ef4444"/>
  <text x="490" y="180" text-anchor="middle" dominant-baseline="central" fill="white" font-weight="600" font-size="12">Heavy Tier</text>
  <text x="490" y="197" text-anchor="middle" dominant-baseline="central" fill="white" font-size="10">~$500-1000/month</text>
  <text x="490" y="211" text-anchor="middle" dominant-baseline="central" fill="white" font-size="10">Cortexia</text>

  <!-- Cost Dimension 2 -->
  <text style="font-size: 13px; font-weight: 600;" x="340" y="280" text-anchor="middle" fill="#f1f5f9">Cost Dimension 2: Per Workflow Execution</text>

  <rect x="40" y="300" width="600" height="130" rx="8" fill="rgba(30, 41, 59, 0.6)" stroke="rgba(100, 116, 139, 0.3)" stroke-width="0.5"/>

  <text x="60" y="325" fill="#f1f5f9" font-weight="600" font-size="12">Base cost = Sum of model costs for each sentinel involved</text>

  <text x="60" y="355" fill="#cbd5e1" font-size="11" font-weight="500">Example: Code Review Workflow</text>
  <text x="60" y="372" fill="#cbd5e1" font-size="11">1. Nero (Flash) - $0.05 | 2. Forge (Sonnet) - $0.20 | 3. Clio (Flash) - $0.05</text>
  <text x="60" y="389" fill="#cbd5e1" font-size="11" font-weight="600">Workflow total: ~$0.30 per execution</text>

  <text x="60" y="415" fill="#cbd5e1" font-size="11" font-weight="500">Example: Financial Analysis Workflow</text>
  <text x="60" y="432" fill="#cbd5e1" font-size="11">1. Kairo (Sonnet) - $0.20 | 2. Vector (Pro) - $0.50 | 3. Finoria (Sonnet) - $0.20</text>

  <!-- Cost Dimension 3 -->
  <text style="font-size: 13px; font-weight: 600;" x="340" y="480" text-anchor="middle" fill="#f1f5f9">Cost Dimension 3: Per Platform Integration</text>

  <rect x="40" y="500" width="600" height="120" rx="8" fill="rgba(30, 41, 59, 0.6)" stroke="rgba(100, 116, 139, 0.3)" stroke-width="0.5"/>

  <text x="60" y="525" fill="#f1f5f9" font-weight="600" font-size="12">Platform costs: Subscriptions + API usage fees</text>

  <text x="60" y="550" fill="#cbd5e1" font-size="11" font-weight="500">Current (Operational):</text>
  <text x="60" y="567" fill="#cbd5e1" font-size="11">Google OAuth: $0 | Telegram: $0 | Tailscale: $0-144/year | Gemini API: Pay-as-you-go</text>

  <text x="60" y="590" fill="#cbd5e1" font-size="11" font-weight="500">Post-Launch:</text>
  <text x="60" y="607" fill="#cbd5e1" font-size="11">Whisper/ElevenLabs: Per-minute | Binance: 0.1% commission | HubSpot: $45-3200/month</text>

  <!-- Cost Tracking -->
  <text style="font-size: 13px; font-weight: 600;" x="340" y="650" text-anchor="middle" fill="#f1f5f9">Cost Tracking & Optimization</text>

  <rect x="40" y="670" width="600" height="170" rx="8" fill="rgba(30, 41, 59, 0.6)" stroke="rgba(100, 116, 139, 0.3)" stroke-width="0.5"/>

  <text x="60" y="695" fill="#f1f5f9" font-weight="600" font-size="12">MCC Cost Monitoring Dashboard</text>
  <text x="60" y="715" fill="#cbd5e1" font-size="11">• Real-time spend tracking (per agent, workflow, platform)</text>
  <text x="60" y="732" fill="#cbd5e1" font-size="11">• Budget alerts (80% warning, 100% stop)</text>
  <text x="60" y="749" fill="#cbd5e1" font-size="11">• Monthly rollup and forecasting</text>

  <text x="60" y="775" fill="#f1f5f9" font-weight="600" font-size="12">Optimization Strategies</text>
  <text x="60" y="792" fill="#cbd5e1" font-size="11">1. Model Selection: Flash for drafts, Sonnet/Pro for critical</text>
  <text x="60" y="809" fill="#cbd5e1" font-size="11">2. Batch Processing: Group tasks to reduce overhead</text>
  <text x="60" y="826" fill="#cbd5e1" font-size="11">3. Cache Strategy: Reuse context to reduce tokens</text>
</svg>
