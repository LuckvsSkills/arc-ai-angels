<svg width="100%" viewBox="0 0 680 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <text style="font-size: 18px; font-weight: 500;" x="340" y="30" text-anchor="middle" fill="#f1f5f9">Task Execution Data Flow</text>
  <text x="340" y="50" text-anchor="middle" fill="#94a3b8" font-size="12">Nova → Flux → Omni → Sentinel → Writeback → MCC</text>

  <!-- Step 1 -->
  <text style="font-size: 12px; font-weight: 500;" x="340" y="85" text-anchor="middle" fill="#f1f5f9">Step 1: User Input</text>
  <rect x="150" y="100" width="180" height="60" rx="8" fill="#3b82f6"/>
  <text x="240" y="122" text-anchor="middle" dominant-baseline="central" fill="white" font-weight="600">User Input</text>
  <text x="240" y="142" text-anchor="middle" dominant-baseline="central" fill="white" font-size="12">Via Telegram, API, Chat</text>

  <line x1="240" y1="160" x2="240" y2="190" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <text style="font-size: 12px; font-weight: 500;" x="340" y="205" text-anchor="middle" fill="#f1f5f9">Step 2: Nova Gateway</text>
  <rect x="130" y="220" width="220" height="70" rx="8" fill="#3b82f6"/>
  <text x="240" y="245" text-anchor="middle" dominant-baseline="central" fill="white" font-weight="600">Nova</text>
  <text x="240" y="265" text-anchor="middle" dominant-baseline="central" fill="white" font-size="12">Intake, Structure, Validate</text>
  <text x="240" y="280" text-anchor="middle" dominant-baseline="central" fill="white" font-size="11">Output: Normalized task</text>

  <line x1="240" y1="290" x2="240" y2="320" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <text style="font-size: 12px; font-weight: 500;" x="340" y="335" text-anchor="middle" fill="#f1f5f9">Step 3: Flux Orchestration</text>
  <rect x="100" y="350" width="280" height="80" rx="8" fill="#14b8a6"/>
  <text x="240" y="375" text-anchor="middle" dominant-baseline="central" fill="white" font-weight="600">Flux</text>
  <text x="240" y="392" text-anchor="middle" dominant-baseline="central" fill="white" font-size="12">Route to Omni Leads, Sequence, Dependencies</text>
  <text x="240" y="407" text-anchor="middle" dominant-baseline="central" fill="white" font-size="11">Output: Task + Omni routing</text>

  <line x1="240" y1="430" x2="240" y2="460" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <text style="font-size: 12px; font-weight: 500;" x="340" y="475" text-anchor="middle" fill="#f1f5f9">Step 4: Omni Lead Coordination</text>
  <rect x="80" y="490" width="320" height="85" rx="8" fill="#f97316"/>
  <text x="240" y="515" text-anchor="middle" dominant-baseline="central" fill="white" font-weight="600">Omni Lead</text>
  <text x="240" y="532" text-anchor="middle" dominant-baseline="central" fill="white" font-size="12">Executability check, Route to Sentinels</text>
  <text x="240" y="547" text-anchor="middle" dominant-baseline="central" fill="white" font-size="11">Output: Subtask assignments</text>

  <line x1="240" y1="575" x2="240" y2="605" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5 -->
  <text style="font-size: 12px; font-weight: 500;" x="340" y="620" text-anchor="middle" fill="#f1f5f9">Step 5: Sentinel Execution</text>

  <rect x="60" y="635" width="140" height="80" rx="8" fill="#a855f7"/>
  <text x="130" y="660" text-anchor="middle" dominant-baseline="central" fill="white" font-weight="600">Sentinel</text>
  <text x="130" y="678" text-anchor="middle" dominant-baseline="central" fill="white" font-size="12">Specialized work</text>
  <text x="130" y="695" text-anchor="middle" dominant-baseline="central" fill="white" font-size="11">Output: Result</text>

  <rect x="220" y="635" width="140" height="80" rx="8" fill="#a855f7"/>
  <text x="290" y="660" text-anchor="middle" dominant-baseline="central" fill="white" font-weight="600">Sentinel</text>
  <text x="290" y="678" text-anchor="middle" dominant-baseline="central" fill="white" font-size="12">Specialized work</text>
  <text x="290" y="695" text-anchor="middle" dominant-baseline="central" fill="white" font-size="11">Output: Result</text>

  <rect x="380" y="635" width="140" height="80" rx="8" fill="#a855f7"/>
  <text x="450" y="660" text-anchor="middle" dominant-baseline="central" fill="white" font-weight="600">Sentinel</text>
  <text x="450" y="678" text-anchor="middle" dominant-baseline="central" fill="white" font-size="12">Specialized work</text>
  <text x="450" y="695" text-anchor="middle" dominant-baseline="central" fill="white" font-size="11">Output: Result</text>

  <!-- Arrows down -->
  <line x1="200" y1="575" x2="130" y2="635" stroke="#60a5fa" stroke-width="0.8" marker-end="url(#arrow)"/>
  <line x1="240" y1="575" x2="290" y2="635" stroke="#60a5fa" stroke-width="0.8" marker-end="url(#arrow)"/>
  <line x1="280" y1="575" x2="450" y2="635" stroke="#60a5fa" stroke-width="0.8" marker-end="url(#arrow)"/>

  <!-- Arrows back up -->
  <line x1="130" y1="715" x2="130" y2="745" stroke="#60a5fa" stroke-width="0.8" marker-end="url(#arrow)"/>
  <line x1="290" y1="715" x2="290" y2="745" stroke="#60a5fa" stroke-width="0.8" marker-end="url(#arrow)"/>
  <line x1="450" y1="715" x2="450" y2="745" stroke="#60a5fa" stroke-width="0.8" marker-end="url(#arrow)"/>

  <!-- Step 6 -->
  <text style="font-size: 12px; font-weight: 500;" x="340" y="760" text-anchor="middle" fill="#f1f5f9">Step 6: Writeback & Traceability</text>
  <rect x="100" y="775" width="280" height="70" rx="8" fill="#10b981"/>
  <text x="240" y="800" text-anchor="middle" dominant-baseline="central" fill="white" font-weight="600">Writeback Daemon</text>
  <text x="240" y="818" text-anchor="middle" dominant-baseline="central" fill="white" font-size="12">Store in runs.json, Task history</text>

  <line x1="240" y1="845" x2="240" y2="870" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 7 -->
  <text style="font-size: 12px; font-weight: 500;" x="340" y="885" text-anchor="middle" fill="#f1f5f9">Step 7: Mission Control Display</text>
</svg>
